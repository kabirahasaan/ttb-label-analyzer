<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200">
  <rect width="900" height="1200" fill="#f8fafc" />
  <rect x="60" y="60" width="780" height="1080" rx="24" fill="#ffffff" stroke="#0f172a"
    stroke-width="4" />
  <text x="90" y="190" font-family="Arial, sans-serif" font-size="52" font-weight="700"
    fill="#111827">Hoppy Trails IPA</text>
  <text x="90" y="260" font-family="Arial, sans-serif" font-size="34" fill="#1f2937">ALC/VOL 6.5%</text>
  <text x="90" y="315" font-family="Arial, sans-serif" font-size="30" fill="#1f2937">NET CONTENTS 12
    fl oz (355 mL)</text>
  <text x="90" y="370" font-family="Arial, sans-serif" font-size="30" fill="#1f2937">MOUNTAIN VIEW
